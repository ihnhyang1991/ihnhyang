<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최인향_포트폴리오</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <style>
        /* 1. 기본 세팅 */
        body {
            margin: 0;
            padding: 0;
            background-color: #a3e635; /*linear-gradient(135deg, #ccff00 0%, #a3e635 100%);*/
            
            /* [2. 폰트 적용] Pretendard를 최우선으로 설정 */
            font-family: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
            
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* 배경 캔버스 스타일 (화면 가득 채우기 고정) */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; 
            display: block;
        }
        
        /* 2. 상단 네비게이션 바 */
        .navbar {
            background-color: transparent;
            height: 60px;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 100; 
        }

        .logo {
            font-size: 24px;
            font-weight: 800; /* 폰트가 바뀌었으므로 굵기 조정 (Pretendard는 굵기 표현이 자유로움) */
            color: white;
            cursor: pointer;
            animation: float 2s ease-in-out infinite;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            letter-spacing: -0.5px; /* 자간을 살짝 좁혀서 단단한 느낌 */
        }

        .menu-links {
            display: flex;
            gap: 25px;
        }

        .menu-links a {
            text-decoration: none;
            color: #0e8b75;
            font-weight: 700; /* Bold */
            font-size: 1.1em;
            transition: color 0.3s;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .menu-links a:hover {
            color: white;
        }

        .menu-toggle-btn {
            display: none; 
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 101;
        }

        /* 3. 메인 화면 컨테이너 */
        .hero-section {
            height: calc(100vh - 60px);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            pointer-events: none; 
        }

        /* 4. 타이핑 텍스트 효과 */
        .typing-text {
            color: white;
            font-size: 2.5rem; 
            font-family: "Pretendard", monospace; /* 영문 타자기 느낌을 위해 monospace 혼용 가능 */
            font-weight: 800; /* Extra Bold */
            border-right: 3px solid white;
            white-space: nowrap;
            overflow: hidden;
            width: 23ch; 
            animation: 
                typing 6s steps(39) infinite , 
                blink .5s step-end infinite ;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
            letter-spacing: -1px;
        }

        /* 5. 중앙 3D 정육면체 스타일 */
        .cube-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            transform: translate(-50%, -50%);
            perspective: 1000px; 
            z-index: 5; 
            pointer-events: none; 
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCube 15s infinite linear; 
        }

        .cube-face {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 2px solid #0e8b75; 
            background: rgba(14, 139, 117, 0.1); 
            box-shadow: 0 0 15px rgba(14, 139, 117, 0.5); 
        }

        .front  { transform: rotateY(0deg) translateZ(100px); }
        .back   { transform: rotateY(180deg) translateZ(100px); }
        .right  { transform: rotateY(90deg) translateZ(100px); }
        .left   { transform: rotateY(-90deg) translateZ(100px); }
        .top    { transform: rotateX(90deg) translateZ(100px); }
        .bottom { transform: rotateX(-90deg) translateZ(100px); }

        @keyframes rotateCube {
            from { transform: rotateX(0deg) rotateY(0deg); }
            to { transform: rotateX(360deg) rotateY(360deg); }
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
        @keyframes typing { from { width: 0 } }
        @keyframes blink { 50% { border-color: transparent } }

        /* 모바일 반응형 */
        @media (max-width: 768px) {
            .navbar { padding: 0 20px; }
            .menu-toggle-btn { display: block; }

            .menu-links {
                position: fixed; 
                top: 0;
                right: -100%; 
                width: 70%; 
                height: 100vh; 
                background-color: rgba(37, 37, 37, 0.95); 
                flex-direction: column; 
                justify-content: center;
                align-items: center;
                gap: 40px;
                transition: right 0.3s ease-in-out; 
                z-index: 99;
            }

            .menu-links.active { right: 0; }
            .menu-links a { font-size: 1.5em; }
            
            .typing-text {
                font-size: 1.5rem; 
                width: auto; 
                white-space: normal; 
                border-right: none; 
                text-align: center;
                animation: none; 
            }

            .cube-wrapper {
                width: 150px;
                height: 150px;
            }
            .cube-face {
                width: 150px;
                height: 150px;
            }
            .front  { transform: rotateY(0deg) translateZ(75px); }
            .back   { transform: rotateY(180deg) translateZ(75px); }
            .right  { transform: rotateY(90deg) translateZ(75px); }
            .left   { transform: rotateY(-90deg) translateZ(75px); }
            .top    { transform: rotateX(90deg) translateZ(75px); }
            .bottom { transform: rotateX(-90deg) translateZ(75px); }
        }
    </style>
</head>
<body>

    <canvas id="networkCanvas"></canvas>

    <div class="cube-wrapper">
        <div class="cube">
            <div class="cube-face front"></div>
            <div class="cube-face back"></div>
            <div class="cube-face right"></div>
            <div class="cube-face left"></div>
            <div class="cube-face top"></div>
            <div class="cube-face bottom"></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo">Portfolio</div>
        
        <div class="menu-toggle-btn" id="mobile-menu-btn">
            <i class="fa-solid fa-bars"></i>
        </div>

        <div class="menu-links" id="nav-links">
            <a href="https://appreciated-deck-009657.framer.app" target="_blank">Products</a>
            <a href="https://various-thanks-436425.framer.app" target="_blank">Packaging</a>
            <a href="https://placid-reason-353978.framer.app" target="_blank">Banner</a>
            <a href="https://second-triangle-816046.framer.app" target="_blank">Shopping mall</a>
            <a href="https://ihnhyang19916e37.myportfolio.com/1691d54e58a427" target="_blank">About Me</a>
        </div>
    </nav>

    <div class="hero-section">
        <div class="typing-text">트랜드 리딩 최인향 웹디자이너입니다.</div>
    </div>


    <script>
        // 1. 모바일 햄버거 메뉴 기능
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const navLinks = document.getElementById('nav-links');
        const icon = mobileBtn.querySelector('i');

        mobileBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-xmark');
        });

        // 2. 배경 점 연결 애니메이션
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        const particleCount = 100; 
        const connectionDistance = 150; 
        const mouseDistance = 200; 
        const particleColor = '#0e8b75'; 

        let mouse = { x: null, y: null };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }
        
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1.5; 
                this.vy = (Math.random() - 0.5) * 1.5; 
                this.size = Math.random() * 2 + 1; 
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = particleColor;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < connectionDistance) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(14, 139, 117, ${1 - distance / connectionDistance})`; 
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }

                if (mouse.x != null) {
                    const dx = particles[i].x - mouse.x;
                    const dy = particles[i].y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouseDistance) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 255, 255, ${1 - distance / mouseDistance})`; 
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        resize();
        animate();

    </script>
    
</body>
</html>
