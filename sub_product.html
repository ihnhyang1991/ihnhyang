<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최인향_포트폴리오</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <style>
        /* 1. 기본 세팅 - 스크롤 가능하도록 변경 */
        body {
            margin: 0;
            padding: 0;
            background-color: #e8f1b7;
            font-family: "Pretendard Variable", "Pretendard", sans-serif;
            overflow-x: hidden; /* 가로 스크롤만 방지 */
            width: 100%;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; 
            display: block;
        }
        
        /* 2. 상단 네비게이션 바 */
        .navbar {
            background-color: rgba(232, 241, 183, 0.8); /* 스크롤 시 글자 가독성을 위해 배경 추가 */
            backdrop-filter: blur(10px);
            height: 60px;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed; /* 상단 고정 */
            top: 0;
            left: 0;
            right: 0;
            z-index: 100; 
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #0e8b75;
            cursor: pointer;
            letter-spacing: -0.5px;
        }

        .menu-links {
            display: flex;
            gap: 25px;
        }

        .menu-links a {
            text-decoration: none;
            color: #0e8b75;
            font-weight: 700;
            font-size: 1.1em;
            transition: color 0.3s;
        }

        /* 3. 섹션 구조 설정 */
        .content-wrapper {
            position: relative;
            z-index: 50;
            padding-top: 100px; /* 네비바 공간 확보 */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 150px; /* 섹션 간 간격 */
            padding-bottom: 200px;
        }

        .section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 이미지 스타일 */
        .project-image {
            max-width: 1350px;
            width: 50%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 60px; /* 사진과 버튼 사이 간격 */
        }

        /* 원형 버튼 공통 스타일 */
        .circle-btn {
            width: 240px; 
            height: 240px; 
            border-radius: 50%;
            border: 6px solid white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: white;
            font-weight: 800;
            font-size: 1.6rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            animation: floating 4s ease-in-out infinite;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        .circle-btn::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.25);
            z-index: 1;
            transition: background 0.3s;
        }

        .circle-btn:hover::before {
            background: rgba(0,0,0,0.1);
        }

        .circle-btn span {
            position: relative;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* 각 프로젝트 배경 이미지 */
        .circle-btn1 { background-image: url("https://cdn.myportfolio.com/7fb376b3-7640-4ffc-90f5-31e5ebd67e12/c5962c83-54a7-45c7-a43c-ffa3c484f05d_rw_1920.jpg?h=374dc2bd4ab718e811e7b9ff08fa3dbd"); }
        .circle-btn2 { background-image: url("https://cdn.myportfolio.com/7fb376b3-7640-4ffc-90f5-31e5ebd67e12/a4271987-a757-4153-aa28-55dc1b2e423d_rw_1920.jpg?h=e7d6852ee04ebbabdc8b6fdca85dc415"); animation-delay: 2s; }

        .circle-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 20px 45px rgba(0,0,0,0.15);
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .circle-btn {
                width: 180px;
                height: 180px;
                font-size: 1.2rem;
            }
            .content-wrapper { gap: 100px; }
        }
    </style>
</head>
<body>

    <canvas id="networkCanvas"></canvas>

    <nav class="navbar">
        <div class="logo">Portfolio</div>
        <div class="menu-links">
 			<a href="sub_product.html" target="_blank">Products</a>
            <a href="sub_package.html" target="_blank">Packaging</a>
            <a href="sub_banner.html" target="_blank">Banner</a>
            <a href="sub_web.html" target="_blank">Web</a>
            <a href="sub_resume.html" target="_blank">About Me</a>
        </div>
    </nav>

    <div class="content-wrapper">
        
        <div class="section">
            <img src="https://cdn.myportfolio.com/01f23203-3efd-47b5-a516-60783aed979d/33980409-f288-4cda-bad4-b64502f60f6f.png?h=a078e6c6513a2b54a8f1553b3d7a3655"   alt="Project 01 Image" class="project-image">
         
        </div>

    </div>

    <script>
        // 캔버스 배경 스크립트는 기존과 동일하게 유지
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        const particleCount = 70; 
        const connectionDistance = 150; 
        const particleColor = 'rgba(14, 139, 117, 0.3)';

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }
        window.addEventListener('resize', resize);

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1; 
                this.vy = (Math.random() - 0.5) * 1; 
                this.size = Math.random() * 2 + 1; 
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = particleColor;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) { particles.push(new Particle()); }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < connectionDistance) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(14, 139, 117, ${0.2 - (dist / connectionDistance) * 0.2})`; 
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        resize();
        animate();
    </script>
</body>
</html>
